<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reelz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='30' fill='%233b82f6'/><circle cx='32' cy='32' r='10' fill='%2309090b'/><circle cx='32' cy='32' r='6' fill='%233b82f6'/><circle cx='32' cy='8' r='5' fill='%2309090b'/><circle cx='32' cy='56' r='5' fill='%2309090b'/><circle cx='8' cy='32' r='5' fill='%2309090b'/><circle cx='56' cy='32' r='5' fill='%2309090b'/><circle cx='14.6' cy='14.6' r='4.5' fill='%2309090b'/><circle cx='49.4' cy='14.6' r='4.5' fill='%2309090b'/><circle cx='14.6' cy='49.4' r='4.5' fill='%2309090b'/><circle cx='49.4' cy='49.4' r='4.5' fill='%2309090b'/></svg>">
<style>
  /* ===== Variables ===== */
  :root {
    --bg: #09090b;
    --surface-0: #111114;
    --surface-1: #18181b;
    --surface-2: #1f1f23;
    --surface-hover: #27272b;
    --text: #ececef;
    --text-2: #a0a0a8;
    --text-3: #63636b;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent-glow: rgba(59, 130, 246, 0.12);
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.12);
    --amber: #eab308;
    --amber-dim: rgba(234, 179, 8, 0.12);
    --red: #ef4444;
    --red-dim: rgba(239, 68, 68, 0.12);
    --purple: #a855f7;
    --purple-dim: rgba(168, 85, 247, 0.12);
    --teal: #14b8a6;
    --teal-dim: rgba(20, 184, 166, 0.12);
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-xs: 4px;
  }

  /* ===== Reset & Base ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
    line-height: 1.5;
  }

  /* ===== Header ===== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(9, 9, 11, 0.82);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 52px;
    gap: 28px;
    max-width: 720px;
    margin: 0 auto;
  }

  .app-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  /* ===== Tabs ===== */
  .tabs {
    display: flex;
    gap: 4px;
    position: relative;
  }

  .tab {
    background: none;
    border: none;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-3);
    padding: 6px 12px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: color 0.15s, background 0.15s;
    user-select: none;
    position: relative;
  }

  .tab:hover { color: var(--text-2); background: var(--surface-1); }
  .tab.active { color: var(--text); background: var(--surface-2); font-weight: 600; }

  .tab-indicator { display: none; }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 9px;
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ===== Main ===== */
  main {
    padding-top: 56px;
    height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #health-banners {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .view {
    display: none;
    padding: 16px 24px 80px;
    max-width: 720px;
    margin: 0 auto;
  }

  .view.active { display: block; }

  /* ===== Search bar ===== */
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .search-input-wrap {
    position: relative;
    flex: 1;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-3);
    pointer-events: none;
  }

  .search-input-wrap input {
    width: 100%;
    height: 48px;
    padding: 0 60px 0 42px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface-1);
    color: var(--text);
    font: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .search-input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .search-input-wrap input::placeholder { color: var(--text-3); }

  .search-kbd {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 2px 6px;
    pointer-events: none;
    transition: opacity 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .search-input-wrap input:focus ~ .search-kbd { opacity: 0; }

  .search-btn {
    height: 48px;
    min-width: 80px;
    padding: 0 20px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    letter-spacing: -0.01em;
  }

  .search-btn:hover { background: var(--accent-hover); }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* ===== Result cards ===== */
  .result-card {
    display: flex;
    gap: 14px;
    padding: 14px;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    transition: border-color 0.15s, background 0.15s;
    animation: cardIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .result-card:hover {
    border-color: var(--border-strong);
    background: var(--surface-2);
  }

  .poster {
    width: 72px;
    height: 108px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    background: var(--surface-2);
    flex-shrink: 0;
  }

  .poster-placeholder {
    width: 72px;
    height: 108px;
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .poster-placeholder svg {
    width: 24px;
    height: 24px;
    opacity: 0.2;
    color: var(--text-3);
  }

  .result-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .result-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.02em;
  }

  .result-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .result-year {
    font-size: 12px;
    color: var(--text-2);
    font-weight: 600;
  }

  .rating-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: var(--radius-xs);
    line-height: 1;
  }

  .rating-badge.imdb {
    background: rgba(245, 197, 24, 0.12);
    color: #f5c518;
  }

  .rating-badge.rt {
    background: var(--red-dim);
    color: var(--red);
  }

  .rating-badge.rt.fresh {
    background: var(--green-dim);
    color: var(--green);
  }

  .rating-badge.mc {
    background: rgba(102, 204, 0, 0.12);
    color: #6c3;
  }

  .result-runtime {
    font-size: 11px;
    color: var(--text-3);
    font-weight: 500;
  }

  .result-genres {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .genre-pill {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    line-height: 1.2;
  }

  .result-overview {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-top: auto;
  }

  .result-overview.expanded {
    -webkit-line-clamp: unset;
    display: block;
  }

  .overview-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    margin-top: 2px;
  }

  .overview-toggle:hover { color: var(--accent-hover); }

  .add-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-2);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
    align-self: center;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .add-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.05); }
  .add-btn:active { transform: scale(0.9); }
  .add-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
  .add-btn.added { background: var(--green); border-color: var(--green); color: #fff; pointer-events: none; }

  /* ===== Download cards ===== */
  .dl-card {
    padding: 16px;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }

  .dl-card:hover { border-color: var(--border-strong); }

  .dl-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
    line-height: 1.4;
    word-break: break-word;
    letter-spacing: -0.01em;
  }

  .dl-bar-track {
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .dl-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .dl-bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s ease-in-out infinite;
  }

  .dl-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-3);
    font-weight: 500;
  }

  /* ===== Seeding section ===== */
  .seeding-toggle {
    background: none;
    border: none;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    cursor: pointer;
    padding: 14px 0 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .seeding-toggle .arrow {
    display: inline-block;
    font-size: 9px;
    transition: transform 0.2s ease;
  }

  .seeding-toggle.open .arrow { transform: rotate(90deg); }

  .seeding-list {
    display: none;
    padding-top: 4px;
  }

  .seeding-list.open { display: block; }

  .seeding-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .seeding-item:last-child { border-bottom: none; }

  .seeding-item-info { flex: 1; min-width: 0; }

  .seeding-item-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    word-break: break-word;
    line-height: 1.4;
  }

  .seeding-item-meta {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--text-3);
    font-weight: 500;
    margin-top: 3px;
  }

  .seeding-remove {
    background: none;
    border: none;
    color: var(--text-3);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
    border-radius: var(--radius-xs);
  }

  .seeding-item:hover .seeding-remove { opacity: 1; }
  .seeding-remove:hover { color: var(--red); background: var(--red-dim); }

  .seeding-summary {
    display: flex;
    gap: 14px;
    padding: 8px 0 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    border-bottom: 1px solid var(--border);
  }

  .seeding-summary span { white-space: nowrap; }

  /* ===== Empty states ===== */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-3);
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    opacity: 0.15;
    color: var(--text-3);
  }

  .empty-state p {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
  }

  .empty-state .empty-sub {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-3);
    margin-top: 4px;
    opacity: 0.7;
  }

  /* ===== Health banner ===== */
  .health-banner {
    margin: 0 0 12px;
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    background: var(--red-dim);
    border: 1px solid rgba(239, 68, 68, 0.2);
    color: var(--red);
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    animation: cardIn 0.3s ease both;
  }

  .health-banner .dismiss {
    background: none;
    border: none;
    color: var(--red);
    font-size: 16px;
    cursor: pointer;
    padding: 0 4px;
    opacity: 0.6;
    line-height: 1;
  }

  .health-banner .dismiss:hover { opacity: 1; }

  /* ===== Release picker modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.15s ease;
  }

  .modal {
    background: var(--surface-0);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 90%;
    max-width: 680px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .modal-header h2 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 18px;
    color: var(--text-3);
    cursor: pointer;
    padding: 4px;
    border-radius: var(--radius-xs);
    transition: background 0.1s, color 0.1s;
    line-height: 1;
  }

  .modal-close:hover { background: var(--surface-2); color: var(--text); }

  .modal-body {
    overflow-y: auto;
    padding: 4px 0;
    flex: 1;
  }

  .modal-loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-3);
    font-size: 13px;
  }

  .release-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border);
  }

  .release-row:last-child { border-bottom: none; }
  .release-row:hover { background: var(--surface-1); }

  .quality-badge {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: var(--radius-xs);
    line-height: 1.2;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  .quality-badge.q-4k { background: var(--purple-dim); color: var(--purple); }
  .quality-badge.q-1080 { background: var(--accent-glow); color: var(--accent); }
  .quality-badge.q-720 { background: var(--teal-dim); color: var(--teal); }
  .quality-badge.q-sd { background: var(--surface-2); color: var(--text-3); }

  .release-info { flex: 1; min-width: 0; }

  .release-title {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
    word-break: break-word;
    color: var(--text-2);
  }

  .release-indexer {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
  }

  .release-seeders {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .seeder-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .seeder-dot.good { background: var(--green); }
  .seeder-dot.ok { background: var(--amber); }
  .seeder-dot.poor { background: var(--red); }

  .release-size {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    color: var(--text-2);
    min-width: 56px;
    text-align: right;
  }

  .release-grab {
    padding: 5px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    color: var(--text);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.12s;
  }

  .release-grab:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .release-grab:disabled { opacity: 0.3; cursor: default; }
  .release-grab.grabbed {
    background: var(--green); border-color: var(--green); color: #fff;
    pointer-events: none;
  }

  /* ===== Release picker: recommendation + sections ===== */
  .release-rec {
    padding: 12px 20px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.5;
  }
  .release-rec .rec-tier {
    font-weight: 700;
    padding: 2px 8px;
    border-radius: var(--radius-xs);
    font-size: 11px;
    letter-spacing: 0.02em;
    margin-right: 6px;
  }
  .release-rec.rec-4k .rec-tier { background: var(--purple-dim); color: var(--purple); }
  .release-rec.rec-1080 .rec-tier { background: var(--accent-glow); color: var(--accent); }
  .release-rec.rec-other .rec-tier { background: var(--surface-2); color: var(--text-3); }

  .release-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--surface-0);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .release-section-header:hover { color: var(--text-2); }
  .section-arrow {
    display: inline-block;
    font-size: 9px;
    transition: transform 0.2s ease;
  }
  .release-section-header.collapsed .section-arrow { transform: rotate(-90deg); }
  .release-section-rows.collapsed { display: none; }
  .release-section-count {
    font-weight: 500;
    color: var(--text-3);
    opacity: 0.6;
  }

  .modal-body::-webkit-scrollbar { width: 6px; }
  .modal-body::-webkit-scrollbar-track { background: transparent; }
  .modal-body::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 3px;
  }
  .modal-body::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }

  /* ===== Download card header & remove ===== */
  .dl-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }

  .dl-header .dl-name { margin-bottom: 0; }

  .dl-remove {
    background: none;
    border: none;
    color: var(--text-3);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
    border-radius: var(--radius-xs);
  }

  .dl-card:hover .dl-remove { opacity: 1; }
  .dl-remove:hover { color: var(--red); background: var(--red-dim); }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    z-index: 200;
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    white-space: nowrap;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
  .toast.info { background: var(--accent); }
  .toast.warning { background: var(--amber); color: #000; }

  /* ===== Spinner ===== */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  .spinner.dark {
    border-color: var(--border-strong);
    border-top-color: var(--text-2);
  }

  /* ===== Animations ===== */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== Scrollbar ===== */
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 3px;
  }
  main::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
</style>

<div class="toast" id="toast"></div>

<script>
/* ===== Util: fetch with timeout ===== */
function fetchWithTimeout(url, opts, ms) {
  ms = ms || 15000;
  var controller = new AbortController();
  opts = opts || {};
  opts.signal = controller.signal;
  var timer = setTimeout(function() { controller.abort(); }, ms);
  return fetch(url, opts).finally(function() { clearTimeout(timer); });
}

/* ===== State ===== */
let currentTab = 'search';
let refreshInterval = null;
let searchResults = [];
let lastSeedingHash = '';

/* ===== Init ===== */
document.addEventListener('DOMContentLoaded', () => {
  updateIndicator();

  var searchInput = document.getElementById('search-input');
  var debounceTimer = null;
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { clearTimeout(debounceTimer); doSearch(); }
  });
  searchInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doSearch, 300);
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });

  window.addEventListener('resize', updateIndicator);

  // Global keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    // Cmd+K to focus search
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      if (currentTab !== 'search') switchTab('search');
      var si = document.getElementById('search-input');
      si.focus();
      si.select();
      return;
    }
    // Escape to close modal
    if (e.key === 'Escape') {
      var modal = document.querySelector('.modal-overlay');
      if (modal) modal.remove();
    }
  });

  checkHealth();
});

/* ===== Health check ===== */
function checkHealth() {
  var container = document.getElementById('health-banners');
  container.textContent = '';
  var offline = [];

  var radarrCheck = fetch('/api/radarr/health').then(function(r) {
    if (!r.ok) throw new Error();
  }).catch(function() { offline.push('Radarr'); });

  var qbtCheck = fetch('/api/qbt/torrents/info').then(function(r) {
    if (!r.ok) throw new Error();
  }).catch(function() { offline.push('qBittorrent'); });

  Promise.all([radarrCheck, qbtCheck]).then(function() {
    if (!offline.length) return;
    var msg = offline.join(' and ') + ' offline.';
    addBanner(container, msg, true);
  });
}

function addBanner(container, message, showStart) {
  var banner = document.createElement('div');
  banner.className = 'health-banner';
  var span = document.createElement('span');
  span.textContent = message;
  banner.appendChild(span);

  var actions = document.createElement('span');
  actions.style.display = 'flex';
  actions.style.gap = '8px';
  actions.style.alignItems = 'center';

  if (showStart) {
    var startBtn = document.createElement('button');
    startBtn.textContent = 'Start Services';
    startBtn.style.cssText = 'background:var(--red);color:#fff;border:none;border-radius:6px;padding:4px 12px;font:inherit;font-size:12px;font-weight:600;cursor:pointer';
    startBtn.addEventListener('click', function() {
      startBtn.disabled = true;
      startBtn.textContent = 'Starting\u2026';
      fetch('/api/ensure-services', { method: 'POST' }).then(function(r) {
        if (!r.ok) throw new Error();
        banner.remove();
        showToast('Services starting \u2014 may take a moment', 'info');
        setTimeout(checkHealth, 8000);
      }).catch(function() {
        startBtn.disabled = false;
        startBtn.textContent = 'Start Services';
        showToast('Failed to start services', 'error');
      });
    });
    actions.appendChild(startBtn);
  }

  var dismiss = document.createElement('button');
  dismiss.className = 'dismiss';
  dismiss.textContent = '\u00d7';
  dismiss.addEventListener('click', function() { banner.remove(); });
  actions.appendChild(dismiss);

  banner.appendChild(actions);
  container.appendChild(banner);
}

/* ===== Tabs ===== */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + tab));
  updateIndicator();

  if (tab === 'downloads') {
    fetchDownloads();
    refreshInterval = setInterval(fetchDownloads, 3000);
  } else {
    clearInterval(refreshInterval);
    refreshInterval = null;
    document.getElementById('search-input').focus();
  }
}

function updateIndicator() {
  const active = document.querySelector('.tab.active');
  const ind = document.getElementById('tab-indicator');
  if (!active) return;
  ind.style.left = active.offsetLeft + 'px';
  ind.style.width = active.offsetWidth + 'px';
}

/* ===== Search relevance scoring ===== */
function scoreRelevance(movie, term) {
  var t = (movie.title || '').toLowerCase();
  var q = term.toLowerCase();
  if (t === q) return 100;
  if (t.startsWith(q)) return 75;
  if (t.includes(q)) return 50;
  return 0;
}

/* ===== Search ===== */
async function doSearch() {
  const input = document.getElementById('search-input');
  const btn = document.getElementById('search-btn');
  const term = input.value.trim();
  if (!term) { input.focus(); return; }

  btn.disabled = true;
  btn.textContent = '';
  var sp = document.createElement('span');
  sp.className = 'spinner';
  btn.appendChild(sp);

  try {
    const res = await fetchWithTimeout('/api/radarr/movie/lookup?term=' + encodeURIComponent(term), null, 15000);
    if (!res.ok) throw new Error('Radarr error (' + res.status + ')');
    var movies = await res.json();

    // Sort by relevance: exact match > starts with > contains > everything else
    // Within the same relevance tier, preserve TMDB's original order
    movies.sort(function(a, b) {
      return scoreRelevance(b, term) - scoreRelevance(a, term);
    });

    searchResults = movies;
    renderResults(movies, term);
  } catch (err) {
    showToast(err.message || 'Search failed', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function formatRuntime(minutes) {
  if (!minutes) return '';
  var h = Math.floor(minutes / 60);
  var m = minutes % 60;
  return h ? h + 'h ' + m + 'm' : m + 'm';
}

function getQualityClass(name) {
  if (!name) return 'q-sd';
  var n = name.toLowerCase();
  if (n.indexOf('2160') !== -1 || n.indexOf('4k') !== -1 || n.indexOf('uhd') !== -1) return 'q-4k';
  if (n.indexOf('1080') !== -1) return 'q-1080';
  if (n.indexOf('720') !== -1) return 'q-720';
  return 'q-sd';
}

function classifyReleaseTier(rel) {
  var name = (rel.quality ? rel.quality.quality.name : '').toLowerCase();
  var title = (rel.title || '').toLowerCase();
  if (name.indexOf('2160') !== -1 || name.indexOf('4k') !== -1 || name.indexOf('uhd') !== -1 ||
      title.indexOf('2160p') !== -1 || title.indexOf('4k') !== -1 || title.indexOf('uhd') !== -1) return '4k';
  if (name.indexOf('1080') !== -1 || title.indexOf('1080p') !== -1) return '1080';
  return 'other';
}

function buildRecommendation(groups) {
  var has4k = groups['4k'].length > 0;
  var has1080 = groups['1080'].length > 0;
  var top4k = has4k ? groups['4k'][0] : null;
  var top1080 = has1080 ? groups['1080'][0] : null;

  var avg4kSize = has4k ? groups['4k'].reduce(function(s, r) { return s + (r.size || 0); }, 0) / groups['4k'].length : 0;
  var avg1080Size = has1080 ? groups['1080'].reduce(function(s, r) { return s + (r.size || 0); }, 0) / groups['1080'].length : 0;
  var sizeRatio = (avg1080Size > 0 && avg4kSize > 0) ? avg4kSize / avg1080Size : 0;
  var sizeNote = (avg4kSize > 0 && avg1080Size > 0)
    ? ' ~' + formatSize(avg4kSize) + ' avg vs ~' + formatSize(avg1080Size) + ' for 1080p.'
    : '';

  // Both tiers available with healthy seeds
  if (has4k && has1080 && (top4k.seeders || 0) >= 10 && (top1080.seeders || 0) >= 5) {
    // Only recommend 4K if the size premium is reasonable (under 2.5x)
    if (sizeRatio > 0 && sizeRatio <= 2.5) {
      return { tier: '4k', text: '4K recommended \u2014 both tiers healthy, reasonable size premium.' + sizeNote };
    }
    return { tier: '1080', text: '1080p recommended \u2014 4K available but files are ' + sizeRatio.toFixed(1) + 'x larger.' + sizeNote };
  }
  // 4K available but weak seeds, 1080p healthy
  if (has4k && has1080 && (top1080.seeders || 0) >= 5) {
    return { tier: '1080', text: '1080p recommended \u2014 4K releases have weak seeds. 1080p is more reliable.' };
  }
  // Only 4K with good seeds
  if (has4k && !has1080 && (top4k.seeders || 0) >= 10) {
    return { tier: '4k', text: '4K \u2014 no 1080p releases available. Good seed health.' };
  }
  // Only 1080p with decent seeds
  if (!has4k && has1080 && (top1080.seeders || 0) >= 3) {
    return { tier: '1080', text: '1080p \u2014 no 4K releases available. Good seed health.' };
  }
  // No good options in either main tier
  if (!has4k && !has1080) {
    return { tier: 'other', text: 'Only lower-quality releases available for this title.' };
  }
  return { tier: 'other', text: 'Check seed counts before grabbing.' };
}

function getSeederLevel(count) {
  if (count >= 10) return 'good';
  if (count >= 3) return 'ok';
  return 'poor';
}

function renderResults(movies, term) {
  const container = document.getElementById('results');
  container.textContent = '';

  if (!movies.length) {
    var empty = document.createElement('div');
    empty.className = 'empty-state';
    var iconSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    iconSvg.setAttribute('class', 'empty-icon');
    var use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
    use.setAttribute('href', '#icon-search');
    iconSvg.appendChild(use);
    empty.appendChild(iconSvg);
    var p = document.createElement('p');
    p.textContent = 'No results for "' + term + '"';
    empty.appendChild(p);
    container.appendChild(empty);
    return;
  }

  movies.slice(0, 20).forEach(function(m, i) {
    var card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = (i * 15) + 'ms';

    // Poster
    var posterUrl = getPoster(m);
    if (posterUrl) {
      var img = document.createElement('img');
      img.className = 'poster';
      img.src = posterUrl;
      img.alt = '';
      img.loading = 'lazy';
      card.appendChild(img);
    } else {
      var ph = document.createElement('div');
      ph.className = 'poster-placeholder';
      var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      var u = document.createElementNS('http://www.w3.org/2000/svg', 'use');
      u.setAttribute('href', '#icon-film');
      svg.appendChild(u);
      ph.appendChild(svg);
      card.appendChild(ph);
    }

    // Info
    var info = document.createElement('div');
    info.className = 'result-info';

    var title = document.createElement('div');
    title.className = 'result-title';
    title.textContent = m.title;
    info.appendChild(title);

    // Meta row: year, ratings, runtime
    var metaRow = document.createElement('div');
    metaRow.className = 'result-meta';

    if (m.year) {
      var yearEl = document.createElement('span');
      yearEl.className = 'result-year';
      yearEl.textContent = m.year;
      metaRow.appendChild(yearEl);
    }

    var ratings = m.ratings || {};
    if (ratings.imdb && ratings.imdb.value) {
      var imdbBadge = document.createElement('span');
      imdbBadge.className = 'rating-badge imdb';
      imdbBadge.textContent = '\u2605 ' + ratings.imdb.value.toFixed(1);
      metaRow.appendChild(imdbBadge);
    }

    if (ratings.rottenTomatoes && ratings.rottenTomatoes.value) {
      var rtVal = ratings.rottenTomatoes.value;
      var rtBadge = document.createElement('span');
      rtBadge.className = 'rating-badge rt' + (rtVal >= 60 ? ' fresh' : '');
      rtBadge.textContent = 'RT ' + rtVal + '%';
      metaRow.appendChild(rtBadge);
    }

    if (ratings.metacritic && ratings.metacritic.value) {
      var mcBadge = document.createElement('span');
      mcBadge.className = 'rating-badge mc';
      mcBadge.textContent = 'MC ' + ratings.metacritic.value;
      metaRow.appendChild(mcBadge);
    }

    if (m.runtime) {
      var runtimeEl = document.createElement('span');
      runtimeEl.className = 'result-runtime';
      runtimeEl.textContent = formatRuntime(m.runtime);
      metaRow.appendChild(runtimeEl);
    }

    if (metaRow.childNodes.length) info.appendChild(metaRow);

    // Genre pills
    if (m.genres && m.genres.length) {
      var genreRow = document.createElement('div');
      genreRow.className = 'result-genres';
      m.genres.slice(0, 3).forEach(function(g) {
        var pill = document.createElement('span');
        pill.className = 'genre-pill';
        pill.textContent = g;
        genreRow.appendChild(pill);
      });
      info.appendChild(genreRow);
    }

    if (m.overview) {
      var overview = document.createElement('div');
      overview.className = 'result-overview';
      overview.textContent = m.overview;
      info.appendChild(overview);

      var toggleBtn = document.createElement('button');
      toggleBtn.className = 'overview-toggle';
      toggleBtn.textContent = 'more';
      toggleBtn.style.display = 'none';
      toggleBtn.addEventListener('click', function() {
        overview.classList.toggle('expanded');
        toggleBtn.textContent = overview.classList.contains('expanded') ? 'less' : 'more';
      });
      info.appendChild(toggleBtn);

      requestAnimationFrame(function() {
        if (overview.scrollHeight > overview.clientHeight) {
          toggleBtn.style.display = '';
        }
      });
    }

    card.appendChild(info);

    // Add button
    var btn = document.createElement('button');
    btn.className = 'add-btn';
    btn.title = 'Add to Radarr';
    btn.textContent = '+';
    btn.addEventListener('click', function() { addMovie(i, btn); });
    card.appendChild(btn);

    container.appendChild(card);
  });
}

function getPoster(movie) {
  if (!movie.images) return null;
  var p = movie.images.find(function(img) { return img.coverType === 'poster'; });
  return p ? (p.remoteUrl || p.url) : null;
}

/* ===== Add Movie ===== */
async function addMovie(idx, btn) {
  var m = searchResults[idx];
  if (!m) return;

  btn.disabled = true;
  btn.textContent = '\u2026';

  try {
    // Ensure Docker + Mullvad are running
    await fetch('/api/ensure-services', { method: 'POST' });

    // Add to Radarr WITHOUT auto-search
    var res = await fetch('/api/radarr/movie', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: m.title,
        year: m.year,
        tmdbId: m.tmdbId,
        titleSlug: m.titleSlug || '',
        images: m.images || [],
        qualityProfileId: 4,
        rootFolderPath: '/movies',
        monitored: true,
        minimumAvailability: 'released',
        addOptions: { searchForMovie: false }
      })
    });

    var data = await res.json();
    var movieId = null;

    if (res.ok && data.id) {
      movieId = data.id;
      btn.classList.add('added');
      btn.textContent = '\u2713';
    } else if (Array.isArray(data)) {
      var msg = data.map(function(e) { return e.errorMessage; }).filter(Boolean).join('; ');
      if (msg.toLowerCase().indexOf('already') !== -1) {
        // Already in library — still let them pick a release
        btn.classList.add('added');
        btn.textContent = '\u2713';
        // Find the movie ID from the library
        var libRes = await fetch('/api/radarr/movie');
        var library = await libRes.json();
        var existing = library.find(function(mov) { return mov.tmdbId === m.tmdbId; });
        if (existing) movieId = existing.id;
      } else {
        throw new Error(msg || 'Failed to add movie');
      }
    } else {
      throw new Error(data.message || 'Unknown error');
    }

    // Show release picker
    if (movieId) {
      showReleasePicker(movieId, m.title + ' (' + m.year + ')');
    }
  } catch (err) {
    showToast(err.message, 'error');
    btn.disabled = false;
    btn.textContent = '+';
  }
}

/* ===== Release Picker ===== */
function showReleasePicker(movieId, movieTitle) {
  // Create modal
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });

  var modal = document.createElement('div');
  modal.className = 'modal';

  // Header
  var header = document.createElement('div');
  header.className = 'modal-header';
  var h2 = document.createElement('h2');
  h2.textContent = movieTitle;
  header.appendChild(h2);
  var closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '\u00d7';
  closeBtn.addEventListener('click', function() { overlay.remove(); });
  header.appendChild(closeBtn);
  modal.appendChild(header);

  // Body
  var body = document.createElement('div');
  body.className = 'modal-body';
  var loading = document.createElement('div');
  loading.className = 'modal-loading';
  var loadSp = document.createElement('span');
  loadSp.className = 'spinner dark';
  loadSp.style.width = '20px';
  loadSp.style.height = '20px';
  loading.appendChild(loadSp);
  loading.appendChild(document.createElement('br'));
  loading.appendChild(document.createElement('br'));
  loading.appendChild(document.createTextNode('Searching for releases\u2026'));
  body.appendChild(loading);
  modal.appendChild(body);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // Fetch releases
  fetchWithTimeout('/api/radarr/release?movieId=' + movieId, null, 30000).then(function(r) {
    if (!r.ok) throw new Error('Failed to fetch releases');
    return r.json();
  }).then(function(releases) {
    body.textContent = '';

    if (!releases.length) {
      var empty = document.createElement('div');
      empty.className = 'modal-loading';
      empty.textContent = 'No releases found. Try again later.';
      body.appendChild(empty);
      return;
    }

    // Group by quality tier
    var groups = { '4k': [], '1080': [], 'other': [] };
    releases.forEach(function(rel) {
      var tier = classifyReleaseTier(rel);
      groups[tier].push(rel);
    });

    // Sort within each group: seeders desc, then size asc
    var sortFn = function(a, b) {
      var sd = (b.seeders || 0) - (a.seeders || 0);
      if (sd !== 0) return sd;
      return (a.size || 0) - (b.size || 0);
    };
    groups['4k'].sort(sortFn);
    groups['1080'].sort(sortFn);
    groups['other'].sort(sortFn);

    // Recommendation banner
    var rec = buildRecommendation(groups);
    var recEl = document.createElement('div');
    recEl.className = 'release-rec rec-' + rec.tier;
    var tierSpan = document.createElement('span');
    tierSpan.className = 'rec-tier';
    tierSpan.textContent = rec.tier === '4k' ? '4K' : rec.tier === '1080' ? '1080p' : 'INFO';
    recEl.appendChild(tierSpan);
    recEl.appendChild(document.createTextNode(rec.text));
    body.appendChild(recEl);

    // Render sections
    var sections = [
      { key: '4k', label: '4K Ultra HD' },
      { key: '1080', label: '1080p HD' },
      { key: 'other', label: 'Other' }
    ];

    sections.forEach(function(sec) {
      var items = groups[sec.key];
      if (!items.length) return;

      var isCollapsed = sec.key === 'other';

      var header = document.createElement('div');
      header.className = 'release-section-header' + (isCollapsed ? ' collapsed' : '');
      var arrow = document.createElement('span');
      arrow.className = 'section-arrow';
      arrow.textContent = '\u25BC';
      header.appendChild(arrow);
      header.appendChild(document.createTextNode(' ' + sec.label + ' '));
      var countSpan = document.createElement('span');
      countSpan.className = 'release-section-count';
      countSpan.textContent = '(' + items.length + ')';
      header.appendChild(countSpan);

      var rowsContainer = document.createElement('div');
      rowsContainer.className = 'release-section-rows' + (isCollapsed ? ' collapsed' : '');

      header.addEventListener('click', function() {
        header.classList.toggle('collapsed');
        rowsContainer.classList.toggle('collapsed');
      });

      body.appendChild(header);

      items.forEach(function(rel) {
        var row = document.createElement('div');
        row.className = 'release-row';

        // Quality badge
        var qualityName = rel.quality ? rel.quality.quality.name : 'Unknown';
        var qBadge = document.createElement('span');
        qBadge.className = 'quality-badge ' + getQualityClass(qualityName);
        qBadge.textContent = qualityName;
        row.appendChild(qBadge);

        // Release info (title + indexer)
        var info = document.createElement('div');
        info.className = 'release-info';
        var title = document.createElement('div');
        title.className = 'release-title';
        title.textContent = rel.title;
        info.appendChild(title);
        if (rel.indexer) {
          var indexer = document.createElement('div');
          indexer.className = 'release-indexer';
          indexer.textContent = rel.indexer;
          info.appendChild(indexer);
        }
        row.appendChild(info);

        // Seeders with colored dot
        if (rel.seeders !== undefined) {
          var seederWrap = document.createElement('div');
          seederWrap.className = 'release-seeders';
          var dot = document.createElement('span');
          dot.className = 'seeder-dot ' + getSeederLevel(rel.seeders);
          seederWrap.appendChild(dot);
          seederWrap.appendChild(document.createTextNode(rel.seeders));
          row.appendChild(seederWrap);
        }

        // Size
        var sizeEl = document.createElement('div');
        sizeEl.className = 'release-size';
        sizeEl.textContent = formatSize(rel.size);
        row.appendChild(sizeEl);

        // Grab button
        var grabBtn = document.createElement('button');
        grabBtn.className = 'release-grab';
        grabBtn.textContent = 'Grab';
        grabBtn.addEventListener('click', function() {
          grabRelease(rel, grabBtn, overlay);
        });
        row.appendChild(grabBtn);

        rowsContainer.appendChild(row);
      });

      body.appendChild(rowsContainer);
    });
  }).catch(function(err) {
    body.textContent = '';
    var errMsg = document.createElement('div');
    errMsg.className = 'modal-loading';
    errMsg.textContent = err.message;
    body.appendChild(errMsg);
  });
}

function grabRelease(release, btn, overlay) {
  btn.disabled = true;
  btn.textContent = '\u2026';

  fetch('/api/radarr/release', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      guid: release.guid,
      indexerId: release.indexerId
    })
  }).then(function(r) {
    if (!r.ok) throw new Error('Grab failed');
    btn.classList.add('grabbed');
    btn.textContent = '\u2713';
    setTimeout(function() {
      overlay.remove();
      showToast('Downloading: ' + release.title, 'success');
      switchTab('downloads');
    }, 600);
  }).catch(function(err) {
    showToast(err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Grab';
  });
}

function formatSize(bytes) {
  if (!bytes) return '?';
  var gb = bytes / 1073741824;
  if (gb >= 1) return gb.toFixed(1) + ' GB';
  return (bytes / 1048576).toFixed(0) + ' MB';
}

/* ===== Remove torrent ===== */
function removeTorrent(hash, name) {
  if (!confirm('Remove "' + name + '" from downloads?')) return;

  fetch('/api/qbt/torrents/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'hashes=' + encodeURIComponent(hash) + '&deleteFiles=true'
  }).then(function(r) {
    if (!r.ok) throw new Error('Delete failed');
    showToast('Removed: ' + name, 'info');
    fetchDownloads();
  }).catch(function(err) {
    showToast(err.message, 'error');
  });
}

/* ===== Downloads ===== */
async function fetchDownloads() {
  try {
    var res = await fetch('/api/qbt/torrents/info');
    if (!res.ok) throw new Error();
    renderDownloads(await res.json());
  } catch (e) {
    document.getElementById('active-container').textContent = '';
    document.getElementById('seeding-container').textContent = '';
    var empty = document.getElementById('downloads-empty');
    empty.style.display = 'block';
    empty.textContent = '';
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'empty-icon');
    var use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
    use.setAttribute('href', '#icon-alert');
    svg.appendChild(use);
    empty.appendChild(svg);
    var p = document.createElement('p');
    p.textContent = 'Cannot connect to qBittorrent';
    empty.appendChild(p);
  }
}

function renderDownloads(torrents) {
  var active = torrents.filter(function(t) { return t.progress < 1; });
  var seeding = torrents.filter(function(t) { return t.progress >= 1; });
  var activeEl = document.getElementById('active-container');
  var seedingEl = document.getElementById('seeding-container');
  var emptyEl = document.getElementById('downloads-empty');

  updateBadge(active.length);
  emptyEl.style.display = (!active.length && !seeding.length) ? 'block' : 'none';

  /* --- Active: update in-place for smooth progress bar transitions --- */
  var currentHashes = {};
  active.forEach(function(t) { currentHashes[t.hash] = true; });

  // Remove cards no longer active
  activeEl.querySelectorAll('.dl-card').forEach(function(card) {
    if (!currentHashes[card.dataset.hash]) card.remove();
  });

  active.forEach(function(t) {
    var pct = (t.progress * 100).toFixed(1);
    var sizeGB = (t.size / 1073741824).toFixed(1);
    var speedMB = (t.dlspeed / 1048576).toFixed(1);
    var eta = formatEta(t.eta);
    var isMeta = t.size === 0 || t.state === 'metaDL';
    var pctText = isMeta ? 'Fetching metadata\u2026' : pct + '% of ' + sizeGB + ' GB';
    var speedText = isMeta ? 'Waiting for peers' : speedMB + ' MB/s \u00b7 ETA ' + eta;
    var card = activeEl.querySelector('[data-hash="' + CSS.escape(t.hash) + '"]');

    if (card) {
      card.querySelector('.dl-bar-fill').style.width = (isMeta ? '0' : pct) + '%';
      card.querySelector('.dl-pct').textContent = pctText;
      card.querySelector('.dl-speed').textContent = speedText;
    } else {
      card = document.createElement('div');
      card.className = 'dl-card';
      card.dataset.hash = t.hash;

      var dlHeader = document.createElement('div');
      dlHeader.className = 'dl-header';
      var name = document.createElement('div');
      name.className = 'dl-name';
      name.textContent = t.name;
      dlHeader.appendChild(name);
      var removeBtn = document.createElement('button');
      removeBtn.className = 'dl-remove';
      removeBtn.title = 'Remove';
      removeBtn.textContent = '\u00d7';
      (function(hash, tname) {
        removeBtn.addEventListener('click', function() { removeTorrent(hash, tname); });
      })(t.hash, t.name);
      dlHeader.appendChild(removeBtn);
      card.appendChild(dlHeader);

      var track = document.createElement('div');
      track.className = 'dl-bar-track';
      var fill = document.createElement('div');
      fill.className = 'dl-bar-fill';
      fill.style.width = '0%';
      track.appendChild(fill);
      card.appendChild(track);

      var meta = document.createElement('div');
      meta.className = 'dl-meta';
      var pctSpan = document.createElement('span');
      pctSpan.className = 'dl-pct';
      pctSpan.textContent = pctText;
      var speedSpan = document.createElement('span');
      speedSpan.className = 'dl-speed';
      speedSpan.textContent = speedText;
      meta.appendChild(pctSpan);
      meta.appendChild(speedSpan);
      card.appendChild(meta);

      activeEl.appendChild(card);

      // Animate bar from 0 to actual value
      requestAnimationFrame(function() { fill.style.width = pct + '%'; });
    }
  });

  /* --- Seeding (diff-check: skip rebuild if unchanged) --- */
  var seedingFingerprint = seeding.map(function(t) {
    return t.hash + ':' + (t.ratio || 0).toFixed(2) + ':' + (t.upspeed || 0);
  }).join(',');
  if (seedingFingerprint !== lastSeedingHash) {
    lastSeedingHash = seedingFingerprint;

    if (seeding.length) {
      var wasOpen = seedingEl.querySelector('.seeding-toggle.open') !== null;

      seedingEl.textContent = '';

      var toggle = document.createElement('button');
      toggle.className = 'seeding-toggle' + (wasOpen ? ' open' : '');
      var arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '\u25B6';
      toggle.appendChild(arrow);
      toggle.appendChild(document.createTextNode(' Seeding (' + seeding.length + ')'));
      toggle.addEventListener('click', function() {
        toggle.classList.toggle('open');
        list.classList.toggle('open');
      });
      seedingEl.appendChild(toggle);

      var list = document.createElement('div');
      list.className = 'seeding-list' + (wasOpen ? ' open' : '');

      // Summary bar
      var totalSize = seeding.reduce(function(s, t) { return s + (t.size || 0); }, 0);
      var avgRatio = seeding.reduce(function(s, t) { return s + (t.ratio || 0); }, 0) / seeding.length;
      var totalUpSpeed = seeding.reduce(function(s, t) { return s + (t.upspeed || 0); }, 0);
      var summary = document.createElement('div');
      summary.className = 'seeding-summary';
      var sizeSpan = document.createElement('span');
      sizeSpan.textContent = 'Total: ' + formatSize(totalSize);
      summary.appendChild(sizeSpan);
      var ratioSpan = document.createElement('span');
      ratioSpan.textContent = 'Avg ratio: ' + avgRatio.toFixed(2);
      summary.appendChild(ratioSpan);
      if (totalUpSpeed > 0) {
        var upSpan = document.createElement('span');
        upSpan.textContent = 'Upload: ' + (totalUpSpeed / 1048576).toFixed(1) + ' MB/s';
        summary.appendChild(upSpan);
      }
      list.appendChild(summary);

      seeding.forEach(function(t) {
        var item = document.createElement('div');
        item.className = 'seeding-item';

        var infoDiv = document.createElement('div');
        infoDiv.className = 'seeding-item-info';
        var nameDiv = document.createElement('div');
        nameDiv.className = 'seeding-item-name';
        nameDiv.textContent = t.name;
        infoDiv.appendChild(nameDiv);

        var metaDiv = document.createElement('div');
        metaDiv.className = 'seeding-item-meta';
        var sizeEl = document.createElement('span');
        sizeEl.textContent = formatSize(t.size);
        metaDiv.appendChild(sizeEl);
        var ratioEl = document.createElement('span');
        ratioEl.textContent = 'Ratio ' + (t.ratio || 0).toFixed(2);
        metaDiv.appendChild(ratioEl);
        if (t.upspeed > 0) {
          var upEl = document.createElement('span');
          upEl.textContent = '\u2191 ' + (t.upspeed / 1048576).toFixed(1) + ' MB/s';
          metaDiv.appendChild(upEl);
        }
        infoDiv.appendChild(metaDiv);
        item.appendChild(infoDiv);

        var removeBtn = document.createElement('button');
        removeBtn.className = 'seeding-remove';
        removeBtn.title = 'Remove';
        removeBtn.textContent = '\u00d7';
        (function(hash, tname) {
          removeBtn.addEventListener('click', function() { removeTorrent(hash, tname); });
        })(t.hash, t.name);
        item.appendChild(removeBtn);

        list.appendChild(item);
      });
      seedingEl.appendChild(list);
    } else {
      seedingEl.textContent = '';
    }
  }
}

function updateBadge(count) {
  var tabBtn = document.getElementById('tab-downloads');
  var badge = tabBtn.querySelector('.badge');

  if (count > 0) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'badge';
      tabBtn.appendChild(badge);
    }
    badge.textContent = count;
  } else if (badge) {
    badge.remove();
  }
}

function formatEta(seconds) {
  if (!seconds || seconds <= 0 || seconds >= 8640000) return '\u2014';
  var h = Math.floor(seconds / 3600);
  var m = Math.floor((seconds % 3600) / 60);
  var s = seconds % 60;
  return h ? h + 'h ' + m + 'm' : m + 'm ' + s + 's';
}

/* ===== Toast ===== */
var toastTimeout = null;

function showToast(message, type) {
  type = type || 'info';
  var el = document.getElementById('toast');
  el.textContent = message;
  el.className = 'toast ' + type;
  clearTimeout(toastTimeout);
  void el.offsetHeight; // force reflow for re-trigger
  el.classList.add('show');
  toastTimeout = setTimeout(function() { el.classList.remove('show'); }, 3000);
}
</script>
</body>
