# Media stack — pinned versions for reproducibility. Update deliberately with
# `docker compose pull` after bumping a tag below (don't float on :latest).
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ${HOME}/Downloads/torrents:/downloads
      - ${HOME}/Downloads/Movies:/movies
      - "${HOME}/Downloads/TV Shows:/tv"
    ports:
      - 8080:8080
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Prowlarr pushes indexer config to Radarr/Sonarr, so start after they're healthy.
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:6.0.4
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
      - ${HOME}/Downloads/Movies:/movies
      - ${HOME}/Downloads/torrents:/downloads
    ports:
      - 7878:7878
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Radarr sends downloads to qBittorrent; wait until it's accepting connections.
    depends_on:
      qbittorrent:
        condition: service_healthy
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - "${HOME}/Downloads/TV Shows:/tv"
      - ${HOME}/Downloads/torrents:/downloads
    ports:
      - 8989:8989
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      qbittorrent:
        condition: service_healthy
    restart: unless-stopped
